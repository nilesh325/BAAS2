<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="/static/js/protectroute.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #050811;
      --bg-gradient: linear-gradient(135deg, #050811 0%, #0c1020 60%, #020306 100%);
      --surface:     rgba(13, 20, 38, 0.6);
      --surface-hi:  rgba(22, 33, 58, 0.85);
      --border:      rgba(99, 130, 180, 0.12);
      --border-hi:   rgba(99, 130, 180, 0.28);
      --accent:      #4f7cff;
      --accent2:     #7c3aed;
      --accent-grad: linear-gradient(135deg, #4f7cff, #7c3aed);
      --text:        #f0f4fc;
      --muted:       #64748b;
      --success:     #10b981;
      --danger:      #ef4444;
      --warn:        #f59e0b;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-sans:    'Inter', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background glowing orbs */
    body::before {
      content: '';
      position: fixed;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 124, 255, 0.1) 0%, transparent 65%);
      top: -250px; left: -200px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.07) 0%, transparent 65%);
      bottom: -150px; right: -100px;
      pointer-events: none; z-index: 0;
    }

    /* Grid layout texture */
    .grid-overlay {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ─────────────────────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 50;
      background: rgba(5, 8, 17, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-logo-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: var(--accent-grad);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
    }
    .nav-logo-text {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px;
    }
    .nav-links { display: flex; align-items: center; gap: 28px; }
    .nav-links a {
      font-size: 13px; font-weight: 500; color: var(--muted);
      text-decoration: none; transition: color 0.15s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }
    .nav-cta {
      padding: 8px 18px; border-radius: 9px;
      background: var(--accent-grad);
      color: #fff; font-size: 13px; font-weight: 600;
      text-decoration: none; transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
    }
    .nav-cta:hover { opacity: 0.88; box-shadow: 0 4px 18px rgba(79,124,255,0.4); }

    /* ── Hero ────────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 56px 20px 24px;
      position: relative; z-index: 1;
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 5vw, 42px);
      font-weight: 800;
      letter-spacing: -1.2px;
      color: var(--text);
    }
    .hero-title span {
      background: var(--accent-grad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
      font-family: var(--font-mono);
      letter-spacing: 0.5px;
    }

    /* ── Stats cockpit ───────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 16px;
      padding: 0 20px 40px;
      flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 28px;
      text-align: center;
      min-width: 140px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.25s, transform 0.2s;
    }
    .stat-card:hover {
      border-color: var(--border-hi);
      transform: translateY(-2px);
    }
    .stat-count {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      font-family: var(--font-display);
    }
    .stat-label {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-open   .stat-count { color: var(--warn); }
    .stat-inprog .stat-count { color: var(--accent); }
    .stat-done   .stat-count { color: var(--success); }
    .stat-total  .stat-count { color: #fff; }

    /* ── Toolbar filter ──────────────────────────── */
    .toolbar {
      max-width: 1100px;
      margin: 0 auto 16px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: relative; z-index: 1;
    }
    .search-box {
      flex: 1;
      min-width: 240px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      transition: all 0.2s;
    }
    .search-box::placeholder { color: rgba(255,255,255,0.15); }
    .search-box:focus {
      border-color: var(--accent);
      background: rgba(79, 124, 255, 0.04);
      box-shadow: 0 0 0 3px rgba(79,124,255,0.1);
    }

    .filter-select {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-mono);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .filter-select option { background: var(--bg); color: var(--text); }
    .filter-select:focus { border-color: var(--accent); }

    .refresh-btn {
      background: rgba(79, 124, 255, 0.08);
      border: 1px solid rgba(79, 124, 255, 0.25);
      border-radius: 10px;
      padding: 10px 18px;
      color: var(--accent);
      font-size: 12px;
      font-family: var(--font-mono);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; gap: 8px;
    }
    .refresh-btn:hover { background: rgba(79, 124, 255, 0.15); border-color: var(--accent); color: #fff; }
    .refresh-btn.spinning svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive table ────────────────────────── */
    .table-wrap {
      max-width: 1100px;
      margin: 0 auto 40px;
      padding: 0 32px;
      overflow-x: auto;
      position: relative; z-index: 1;
    }

    .files-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: var(--surface);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .files-table th {
      padding: 14px 16px;
      font-size: 10px;
      font-family: var(--font-mono);
      background: rgba(5, 8, 17, 0.5);
      color: var(--muted);
      text-align: left;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .files-table td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .files-table tbody tr {
      transition: background 0.12s;
    }
    .files-table tbody tr:hover {
      background: rgba(255,255,255,0.02);
    }
    .files-table tbody tr:last-child td { border-bottom: none; }

    .c { text-align: center; }
    .r { text-align: right; }

    /* ── chips ── */
    .email-chip {
      font-family: var(--font-mono);
      font-size: 12px;
      color: #94a3b8;
    }

    .query-text {
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      color: var(--text);
    }

    /* ── status pickers ── */
    .status-dropdown {
      background: var(--surface);
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 11px;
      font-family: var(--font-mono);
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
      text-transform: uppercase;
      font-weight: 600;
    }
    .status-dropdown:focus { border-color: var(--accent); }

    /* ── action buttons ── */
    .action-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      margin: 0 2px;
      color: var(--text);
    }
    .action-btn:hover { background: rgba(255,255,255,0.08); border-color: var(--border-hi); transform: scale(1.05); }
    .action-btn.delete:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: var(--danger); }

    .date-text {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* empty rows */
    .state-row td {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 13px;
    }
    .loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* ── View Modal ──────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(2, 3, 6, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--surface-hi);
      border: 1px solid var(--border-hi);
      border-radius: 20px;
      padding: 32px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 25px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    }
    .modal-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .modal-field {
      margin-bottom: 16px;
    }
    .modal-label {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .modal-value {
      font-size: 13px;
      color: var(--text);
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      word-break: break-all;
      font-family: var(--font-mono);
    }
    .modal-close {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: var(--accent-grad);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-mono);
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
      transition: all 0.2s;
    }
    .modal-close:hover {
      box-shadow: 0 4px 18px rgba(79, 124, 255, 0.35);
    }
    .modal-close:active { transform: scale(0.98); }
  </style>
</head>

<body>
  <div class="grid-overlay"></div>

<!-- Navbar -->
<div id="navbar"></div>
  <script src="/static/js/navbar.js"></script>
  <script>loadNavbar();</script>

<main>
  <div class="hero">
    <h1 class="hero-title">Manage <span>Customer Queries</span></h1>
    <p class="hero-subtitle" id="company-label">Loading company...</p>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-card stat-total">
      <div class="stat-count" id="stat-total">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card stat-open">
      <div class="stat-count" id="stat-open">—</div>
      <div class="stat-label">Open</div>
    </div>
    <div class="stat-card stat-inprog">
      <div class="stat-count" id="stat-inprog">—</div>
      <div class="stat-label">In Progress</div>
    </div>
    <div class="stat-card stat-done">
      <div class="stat-count" id="stat-done">—</div>
      <div class="stat-label">Resolved</div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-box" id="search-input" type="text" placeholder="Search by email or query…" oninput="renderTable()">
    <select class="filter-select" id="filter-status" onchange="renderTable()">
      <option value="">All Statuses</option>
      <option value="open">Open</option>
      <option value="in_progress">In Progress</option>
      <option value="resolved">Resolved</option>
    </select>
    <button class="refresh-btn" id="refresh-btn" onclick="loadTickets()">
      <svg id="refresh-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table class="files-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Email</th>
          <th>Query</th>
          <th class="c">Status</th>
          <th class="c">Actions</th>
          <th class="r">Created</th>
        </tr>
      </thead>
      <tbody id="preview"></tbody>
    </table>
  </div>
</main>

<!-- View Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-title">🎫 Ticket Details</div>
    <div class="modal-field">
      <div class="modal-label">Ticket ID</div>
      <div class="modal-value" id="modal-ticket-id">—</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Email</div>
      <div class="modal-value" id="modal-email">—</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Query</div>
      <div class="modal-value" id="modal-query">—</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Status</div>
      <div class="modal-value" id="modal-status">—</div>
    </div>
    <div class="modal-field">
      <div class="modal-label">Created At</div>
      <div class="modal-value" id="modal-created">—</div>
    </div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  // ─── Company ID from localStorage ─────────────────────────────
  const COMPANY_ID = localStorage.getItem('company_id');

  if (!COMPANY_ID) {
    console.error('No company_id found in localStorage. Is the user logged in?');
  }

  document.getElementById('company-label').textContent = `Company ID: ${COMPANY_ID ?? 'Not logged in'}`;

  // ─── State ────────────────────────────────────────────────────
  let allTickets = [];

  // ─── Helpers ──────────────────────────────────────────────────

  // Formats an ISO date string into a human-readable local date/time.
  // The backend now returns ISO strings, so new Date() parses them correctly.
  function formatDate(isoStr) {
    if (!isoStr) return '—';
    try {
      const d = new Date(isoStr);
      if (isNaN(d.getTime())) return isoStr; // fallback: return as-is
      return d.toLocaleString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    } catch {
      return isoStr;
    }
  }

  function getInitials(email) {
    if (!email) return '??';
    return email.split('@')[0].slice(0, 2).toUpperCase();
  }

  // ─── Update Stats ─────────────────────────────────────────────
  function updateStats(tickets) {
    const open     = tickets.filter(t => t.status === 'open').length;
    const inprog   = tickets.filter(t => t.status === 'in_progress').length;
    const resolved = tickets.filter(t => t.status === 'resolved').length;

    document.getElementById('stat-total').textContent  = tickets.length;
    document.getElementById('stat-open').textContent   = open;
    document.getElementById('stat-inprog').textContent = inprog;
    document.getElementById('stat-done').textContent   = resolved;
  }

  // ─── Render Filtered Table ────────────────────────────────────
  function renderTable() {
    const searchVal = document.getElementById('search-input').value.toLowerCase();
    const statusVal = document.getElementById('filter-status').value;

    const filtered = allTickets.filter(t => {
      const matchSearch = !searchVal ||
        (t.email && t.email.toLowerCase().includes(searchVal)) ||
        (t.query && t.query.toLowerCase().includes(searchVal));
      const matchStatus = !statusVal || t.status === statusVal;
      return matchSearch && matchStatus;
    });

    const table = document.getElementById('preview');
    table.innerHTML = '';

    if (filtered.length === 0) {
      table.innerHTML = `
        <tr class="state-row">
          <td colspan="6">No tickets found</td>
        </tr>`;
      return;
    }

    filtered.forEach(ticket => {
      const row      = document.createElement('tr');
      const initials = getInitials(ticket.email);
      const email    = ticket.email    || '—';
      const query    = ticket.query    || '—';
      // Format date once for display in the table row
      const created  = formatDate(ticket.created_at);

      row.innerHTML = `
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="
              width:32px;height:32px;border-radius:50%;
              background:linear-gradient(135deg,#6366f1,#8b5cf6);
              display:flex;align-items:center;justify-content:center;
              font-size:11px;font-weight:700;color:#fff;flex-shrink:0;">
              ${initials}
            </div>
            <span style="font-size:12px;color:#94a3b8;font-family:'JetBrains Mono',monospace;">
              ${email.split('@')[0]}
            </span>
          </div>
        </td>
        <td><span class="email-chip">${email}</span></td>
        <td><div class="query-text" title="${query}">${query}</div></td>
        <td class="c">
          <select class="status-dropdown" onchange="updateStatus('${ticket.ticket_id}', this.value, this)">
            <option value="open"        ${ticket.status === 'open'        ? 'selected' : ''}>Open</option>
            <option value="in_progress" ${ticket.status === 'in_progress' ? 'selected' : ''}>In Progress</option>
            <option value="resolved"    ${ticket.status === 'resolved'    ? 'selected' : ''}>Resolved</option>
          </select>
        </td>
        <td class="c">
          <button class="action-btn" onclick="viewTicket('${ticket.ticket_id}')" title="View Details">👁️</button>
          <button class="action-btn" onclick="resolveTicket('${ticket.ticket_id}', this)" title="Mark Resolved">✔️</button>
          <button class="action-btn delete" onclick="deleteTicket('${ticket.ticket_id}', this)" title="Delete">🗑️</button>
        </td>
        <td class="r"><span class="date-text">${created}</span></td>
      `;
      table.appendChild(row);
    });
  }

  // ─── Load Tickets from Backend ────────────────────────────────
  async function loadTickets() {
    if (!COMPANY_ID) {
      document.getElementById('preview').innerHTML = `
        <tr class="state-row">
          <td colspan="6">⚠️ No company ID found. Please log in again.</td>
        </tr>`;
      return;
    }

    const btn  = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.classList.add('spinning');

    const table = document.getElementById('preview');
    table.innerHTML = `
      <tr class="state-row">
        <td colspan="6"><span class="loader"></span> Loading tickets…</td>
      </tr>`;

    try {
      const res = await fetch(`/tickets/${COMPANY_ID}`, {
        headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
      });

      if (!res.ok) {
        throw new Error(`Server responded with ${res.status}`);
      }

      const data = await res.json();

      // Support both { tickets: [...] } and a plain array
      allTickets = Array.isArray(data) ? data : (data.tickets || []);

      updateStats(allTickets);
      renderTable();

    } catch (err) {
      console.error('Error loading tickets:', err);
      table.innerHTML = `
        <tr class="state-row">
          <td colspan="6">⚠️ Failed to load tickets: ${err.message}</td>
        </tr>`;
    } finally {
      btn.classList.remove('spinning');
    }
  }

  // ─── View Ticket Modal ────────────────────────────────────────
  function viewTicket(ticketId) {
    const ticket = allTickets.find(t => t.ticket_id === ticketId);
    if (!ticket) return;
    document.getElementById('modal-ticket-id').textContent = ticket.ticket_id || '—';
    document.getElementById('modal-email').textContent     = ticket.email     || '—';
    document.getElementById('modal-query').textContent     = ticket.query     || '—';
    document.getElementById('modal-status').textContent    = ticket.status    || '—';
    // Use the same formatDate helper so the modal always shows a consistent, readable date
    document.getElementById('modal-created').textContent   = formatDate(ticket.created_at);
    document.getElementById('modal-overlay').classList.add('show');
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById('modal-overlay')) {
      document.getElementById('modal-overlay').classList.remove('show');
    }
  }

  // ─── Resolve Ticket ───────────────────────────────────────────
  async function resolveTicket(ticketId, btn) {
    await updateStatus(ticketId, 'resolved', btn);
  }

  // ─── Delete Ticket ────────────────────────────────────────────
  async function deleteTicket(ticketId, btn) {
    if (!confirm('Delete this ticket?')) return;
    try {
      const res = await fetch(`/delete_ticket/${ticketId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
      });
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      allTickets = allTickets.filter(t => t.ticket_id !== ticketId);
      updateStats(allTickets);
      renderTable();
    } catch (err) {
      console.error('Delete error:', err);
      alert(`Failed to delete ticket: ${err.message}`);
    }
  }

  // ─── Update Status ────────────────────────────────────────────
  async function updateStatus(ticketId, status, el) {
    try {
      const res = await fetch(`/update_ticket/${ticketId}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${localStorage.getItem('access_token')}`
        },
        body: JSON.stringify({ status }),
      });

      if (!res.ok) throw new Error(`Server responded with ${res.status}`);

      // Update local state and re-render
      const ticket = allTickets.find(t => t.ticket_id === ticketId);
      if (ticket) ticket.status = status;
      updateStats(allTickets);
      renderTable();

    } catch (err) {
      console.error('Status update error:', err);
      alert(`Failed to update status: ${err.message}`);
    }
  }

  // ─── Init ─────────────────────────────────────────────────────
  loadTickets();
</script>

</body>
</html>
