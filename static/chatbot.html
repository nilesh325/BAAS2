<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Chatbot UI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #050811;
      --bg-gradient: linear-gradient(135deg, #050811 0%, #0c1020 60%, #020306 100%);
      --surface:     rgba(13, 20, 38, 0.6);
      --surface-hi:  rgba(22, 33, 58, 0.85);
      --border:      rgba(99, 130, 180, 0.12);
      --border-hi:   rgba(99, 130, 180, 0.28);
      --accent:      #4f7cff;
      --accent2:     #7c3aed;
      --accent-grad: linear-gradient(135deg, #4f7cff, #7c3aed);
      --text:        #f0f4fc;
      --muted:       #64748b;
      --success:     #10b981;
      --danger:      #ef4444;
      --warn:        #f59e0b;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'IBM Plex Mono', monospace;
      --font-sans:    'Inter', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-gradient);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glowing blobs */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 124, 255, 0.1) 0%, transparent 65%);
      top: -150px; left: -150px;
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.07) 0%, transparent 65%);
      bottom: -150px; right: -150px;
      pointer-events: none; z-index: 0;
    }

    /* Grid overlay texture */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .chat-shell {
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 640px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      z-index: 1;
    }

    .chat-topbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(5, 8, 17, 0.4);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .topbar-left span {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: #fff;
    }

    .bot-avatar {
      width: 32px;
      height: 32px;
      background: var(--accent-grad);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      border: 2px solid rgba(79, 124, 255, 0.35);
      box-shadow: 0 4px 10px rgba(79,124,255,0.2);
    }

    /* Ticket button */
    .ticket-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(79, 124, 255, 0.08);
      border: 1px solid rgba(79, 124, 255, 0.25);
      border-radius: 10px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--accent);
      transition: all 0.2s ease;
      font-family: var(--font-mono);
    }

    .ticket-btn:hover {
      background: var(--accent-grad);
      color: white;
      border-color: transparent;
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(79, 124, 255, 0.3);
    }

    .ticket-btn:hover svg {
      stroke: white;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: rgba(5, 8, 17, 0.15);
    }

    /* Custom scrollbar */
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .messages::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }

    .msg-row { display: flex; gap: 8px; }
    .msg-row.user { justify-content: flex-end; }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.6;
    }

    .user .bubble {
      background: var(--accent-grad);
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 14px rgba(79, 124, 255, 0.2);
    }
    .bot .bubble {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .input-area {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      background: rgba(5, 8, 17, 0.4);
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      outline: none;
      font-family: var(--font-sans);
      font-size: 13.5px;
      color: #fff;
      background: rgba(255, 255, 255, 0.02);
      transition: all 0.2s;
    }

    textarea::placeholder { color: rgba(255, 255, 255, 0.15); }
    textarea:focus {
      border-color: var(--accent);
      background: rgba(79, 124, 255, 0.04);
    }

    .send-btn {
      background: var(--accent-grad);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 12.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
    }

    .send-btn:hover {
      box-shadow: 0 4px 18px rgba(79, 124, 255, 0.35);
      transform: translateY(-1px);
    }
    .send-btn:active { transform: translateY(0); }

    /* Ticket Form Overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 3, 6, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .ticket-form-card {
      background: var(--surface-hi);
      width: 100%;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid var(--border-hi);
      padding: 28px 24px 24px;
      transform: translateY(30px);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6);
    }

    .overlay.show .ticket-form-card {
      transform: translateY(0);
    }

    .form-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .form-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      font-family: var(--font-display);
    }

    .form-title-icon {
      width: 32px;
      height: 32px;
      background: var(--accent-grad);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(79,124,255,0.25);
    }

    .close-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
      transition: all 0.2s;
    }

    .close-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; border-color: var(--border-hi); }

    .form-group { margin-bottom: 16px; }

    .form-group label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-family: var(--font-mono);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 13.5px;
      font-family: var(--font-sans);
      color: #fff;
      outline: none;
      transition: all 0.2s;
      background: rgba(255, 255, 255, 0.02);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.15);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      background: rgba(79, 124, 255, 0.04);
    }

    .form-group textarea {
      resize: none;
      height: 80px;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent-grad);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-mono);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      margin-top: 4px;
      box-shadow: 0 4px 12px rgba(79, 124, 255, 0.25);
    }

    .submit-btn:hover {
      box-shadow: 0 4px 18px rgba(79, 124, 255, 0.35);
      transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }

    .success-msg {
      display: none;
      text-align: center;
      padding: 24px 0 12px;
    }

    .success-msg .check {
      width: 44px;
      height: 44px;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.25);
      color: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 18px;
    }

    .success-msg p { color: var(--muted); font-size: 13px; }
    .success-msg strong { color: #fff; font-family: var(--font-display); font-size: 16px; margin-bottom: 4px; display: block; }
  </style>
</head>
<body>
  <div class="grid-overlay"></div>
<div class="chat-shell">

  <!-- Top bar -->
  <div class="chat-topbar">
    <div class="topbar-left">
      <div class="bot-avatar">✦</div>
      <span><span id="company-name">Company</span> Assistant</span>
    </div>

    <!-- Raise Ticket Button -->
    <button class="ticket-btn" onclick="openTicketForm()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v1a1 1 0 0 0 0 2v1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-1a1 1 0 0 0 0-2V9Z"/>
        <line x1="9" y1="7" x2="9" y2="17"/>
      </svg>
      Raise Ticket
    </button>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="msg-row bot">
      <div class="bubble">Hi! How can I assist you? 👋</div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="chat-input" rows="1" placeholder="Ask a question..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <!-- Ticket Form Overlay -->
  <div class="overlay" id="ticket-overlay" onclick="handleOverlayClick(event)">
    <div class="ticket-form-card" id="ticket-card">

      <div class="form-header">
        <div class="form-title">
          <div class="form-title-icon">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v1a1 1 0 0 0 0 2v1a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-1a1 1 0 0 0 0-2V9Z"/>
              <line x1="9" y1="7" x2="9" y2="17"/>
            </svg>
          </div>
          Raise a Ticket
        </div>
        <button class="close-btn" onclick="closeTicketForm()">✕</button>
      </div>

      <!-- Form fields -->
      <div id="form-fields">
        <div class="form-group">
          <label>Your Email</label>
          <input type="email" id="ticket-email" placeholder="you@company.com" />
        </div>
        <div class="form-group">
          <label>Your Query</label>
          <textarea id="ticket-query" placeholder="Describe your issue or question in detail…"></textarea>
        </div>
        <button class="submit-btn" onclick="submitTicket()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Submit Ticket
        </button>
      </div>

      <!-- Success message -->
      <div class="success-msg" id="success-msg">
        <div class="check">✅</div>
        <strong>Ticket Raised!</strong>
        <p style="margin-top:6px">We've received your query and will get back to you shortly.</p>
      </div>

    </div>
  </div>

</div>

<script>
  const msgs = document.getElementById("messages");
  const input = document.getElementById("chat-input");

  const pathParts = window.location.pathname.split('/');
  const companyId = pathParts[2];
  const sessionId = pathParts[3];

  function addMessage(text, isUser) {
    const row = document.createElement("div");
    row.className = "msg-row " + (isUser ? "user" : "bot");
    row.innerHTML = `<div class="bubble">${text}</div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing";
    row.innerHTML = `<div class="bubble">Typing…</div>`;
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  async function sendMessage() {
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, true);
    input.value = "";
    showTyping();

    try {
      const formData = new FormData();
      formData.append("company_id", companyId);
      formData.append("question", question);

      const response = await fetch("/ask", {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      removeTyping();

      if (!response.ok) {
        addMessage(data.detail || "Error", false);
        return;
      }

      addMessage(data.answer, false);

    } catch (err) {
      removeTyping();
      addMessage("Server error", false);
    }
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  async function loadCompanyName() {
    if (!companyId) return;
    try {
      const res = await fetch(`/companyname/${companyId}`);
      const data = await res.json();
      document.getElementById("company-name").innerText = data.company || "Company";
    } catch (err) {
      console.error(err);
    }
  }
  loadCompanyName();

  /* ── Ticket Form ── */
  function openTicketForm() {
    document.getElementById("ticket-overlay").classList.add("show");
    document.getElementById("form-fields").style.display = "block";
    document.getElementById("success-msg").style.display = "none";
    document.getElementById("ticket-email").value = localStorage.getItem('user_email') || "";
    document.getElementById("ticket-query").value = "";
  }

  function closeTicketForm() {
    document.getElementById("ticket-overlay").classList.remove("show");
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("ticket-overlay")) closeTicketForm();
  }

  async function submitTicket() {
    const email = document.getElementById("ticket-email").value.trim();
    const query = document.getElementById("ticket-query").value.trim();

    if (!email) {
      alert("Please enter a valid email address.");
      return;
    }
    if (!query) {
      alert("Please enter a query or description of your issue.");
      return;
    }

    try {
        const res = await fetch("/register_ticket", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                company: companyId,
                email: email,
                session_id: sessionId,
                query: query
            })
        });

        if (res.ok) {
            document.getElementById("form-fields").style.display = "none";
            document.getElementById("success-msg").style.display = "block";
            
            // Push dynamic ticket creation feedback directly into conversation flow
            addMessage(`🎫 Ticket registered successfully! A support agent will review your query: "${query}"`, false);
            
            setTimeout(closeTicketForm, 2500);
        } else {
            alert("Submission failed.");
        }
    } catch (err) {
        console.error(err);
    }
  }
</script>
</body>
</html>>
